            <button onClick={onClose} className={`absolute top-4 right-4 z-20 ${theme.cardText}`}><X size={24} /></button>
            <div className="overflow-y-auto p-6 space-y-6 pb-8">
              <div className="text-center pt-4">
                 <div className={`w-16 h-16 mx-auto mb-4 border-4 flex items-center justify-center transform rotate-45 ${theme.cardText} border-current`}><span className="font-black text-3xl transform -rotate-45">{merch.group.charAt(0)}</span></div>
                 <h2 className={`text-2xl font-black tracking-widest ${theme.cardText}`}>{merch.group}</h2>
                 <p className={`text-[10px] font-black uppercase tracking-widest mt-1 ${theme.cardText} opacity-60`}>Receipt</p>
              </div>

              <div className={`p-5 rounded-2xl ${isRetro ? 'bg-[#EBB134] border-2 border-[#1C3052]' : 'bg-black/5 dark:bg-white/5'} space-y-4`}>
                <h3 className={`text-[10px] font-black uppercase border-b pb-2 ${theme.cardText} ${isRetro ? 'border-[#1C3052]/30' : 'border-current/20 opacity-50'}`}>商品資訊</h3>
                <div className={`grid grid-cols-2 gap-2 ${theme.cardText}`}>
                  <div><p className="text-[9px] font-bold uppercase opacity-60">狀態</p><p className="text-sm font-bold">{merch.status === 'Received' ? '已到貨' : '預購中'}</p></div>
                  <div><p className="text-[9px] font-bold uppercase opacity-60">類型</p><p className="text-sm font-bold">{merch.buyType === 'instock' ? '現貨' : '預購'}</p></div>
                  
                  {merch.buyType === 'preorder' && merch.estimatedArrival && (
                    <div className="col-span-2 pt-1">
                      <p className="text-[9px] font-bold uppercase opacity-60">預計到貨</p>
                      <p className="text-sm font-mono font-bold">{merch.estimatedArrival.replace('-', ' 年 ')} 月</p>
                    </div>
                  )}
                </div>
                
                <div className={`pt-4 border-t ${isRetro ? 'border-[#1C3052]/20' : 'border-white/10'}`}>
                  <p className={`text-[9px] font-black uppercase ${theme.cardText} opacity-60 mb-2`}>購買品項明細</p>
                  <div className="space-y-2">
                    {merch.items && merch.items.length > 0 ? (
                      merch.items.map((item, idx) => (
                        <div key={idx} className={`flex justify-between items-center text-sm font-bold ${theme.cardText}`}>
                          <span className="truncate pr-4 leading-relaxed flex-1 before:content-['•'] before:mr-2 before:opacity-30">{item.name}</span>
                          <span className="font-mono shrink-0">x{item.quantity}</span>
                        </div>
                      ))
                    ) : (
                      <div className={`flex justify-between items-center text-sm font-bold ${theme.cardText}`}>
                        <span className="truncate pr-4 leading-relaxed flex-1 before:content-['•'] before:mr-2 before:opacity-30">{merch.itemName}</span>
                        <span className="font-mono shrink-0">x1</span>
                      </div>
                    )}
                  </div>
                </div>

                <div className={`grid grid-cols-2 gap-2 pt-4 border-t ${isRetro ? 'border-[#1C3052]/20' : 'border-black/5 dark:border-white/5'} ${theme.cardText}`}>
                  <div><p className="text-[9px] font-bold uppercase opacity-60 mt-2">購入日期</p><p className="text-xs font-mono font-bold">{merch.date || '未填寫'}</p></div>
                  <div><p className="text-[9px] font-bold uppercase opacity-60 mt-2">總價格</p><p className="text-sm font-mono font-black">{Number(merch.price).toLocaleString()} {merch.currency}</p></div>
                </div>
                {merch.orderNo && (
                  <div className={`pt-2 border-t ${isRetro ? 'border-[#1C3052]/20' : 'border-black/5 dark:border-white/5'} ${theme.cardText}`}>
                    <p className="text-[9px] font-bold uppercase opacity-60 mt-2">訂單編號</p><p className="text-sm font-mono font-bold break-all">{merch.orderNo}</p>
                  </div>
                )}
              </div>

              <div className={`p-5 rounded-2xl ${isRetro ? 'bg-[#EBB134] border-2 border-[#1C3052]' : 'bg-black/5 dark:bg-white/5'} space-y-4`}>
                <h3 className={`text-[10px] font-black uppercase border-b pb-2 ${theme.cardText} ${isRetro ? 'border-[#1C3052]/30' : 'border-current/20 opacity-50'}`}>交易明細</h3>
                <div className={`grid grid-cols-2 gap-2 ${theme.cardText}`}>
                  <div><p className="text-[9px] font-bold uppercase opacity-60">購入平台</p><p className="text-sm font-bold truncate">{merch.platform || '未填寫'}</p></div>
                  <div><p className="text-[9px] font-bold uppercase opacity-60">賣家帳號</p><p className="text-sm font-bold truncate">{merch.seller || '未填寫'}</p></div>
                </div>
                <div className={`pt-2 border-t ${isRetro ? 'border-[#1C3052]/20' : 'border-black/5 dark:border-white/5'} ${theme.cardText}`}>
                   <p className="text-[9px] font-bold uppercase opacity-60 mt-2">付款方式</p><p className="text-sm font-bold">{pmMap[merch.paymentMethod] || '未填寫'}</p>
                </div>
                {merch.url && (
                  <div className={`pt-2 border-t ${isRetro ? 'border-[#1C3052]/20' : 'border-black/5 dark:border-white/5'} ${theme.cardText}`}>
                     <p className="text-[9px] font-bold uppercase opacity-60 mt-2">商品網址</p>
                     <a href={merch.url} target="_blank" rel="noopener noreferrer" className={`text-xs font-bold underline flex items-center gap-1 mt-1 ${isRetro ? 'text-[#D12627]' : 'text-blue-500'}`}>點此開啟連結 <ExternalLink size={12}/></a>
                  </div>
                )}
              </div>

              <div className="flex gap-3">
                 <button onClick={onEdit} className={`${btnBase} ${isRetro ? 'bg-white border-2 border-[#1C3052] text-[#1C3052] shadow-[4px_4px_0_#1C3052]' : 'bg-white/10 border-white/20 text-white'}`}><Pencil size={18}/> 編輯</button>
                 <button onClick={onDelete} className={`${btnBase} bg-red-600 border-2 border-red-700 text-white ${isRetro ? 'shadow-[4px_4px_0_#1C3052]' : 'shadow-lg'}`}><Trash2 size={18}/> 刪除</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ConfirmModal({ theme, onConfirm, onCancel }) {
      const isRetro = theme.name === 'Retro Pop';
      return (
        <div className="fixed inset-0 bg-black/95 backdrop-blur-sm z-[200] flex items-center justify-center p-6">
          <div className={`w-full max-w-xs p-8 rounded-3xl ${theme.card} text-center space-y-6 border-4 border-red-500 shadow-2xl`}>
            <div className="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mx-auto text-red-500"><AlertTriangle size={40} /></div>
            <div className="space-y-2">
               <h3 className={`text-xl font-black uppercase tracking-wider ${theme.cardText}`}>確認刪除紀錄？</h3>
               <p className={`text-xs opacity-60 ${theme.cardText}`}>此動作無法復原，<br/>該筆資料將永久從紀錄本中移除。</p>
            </div>
            <div className="flex gap-3 pt-2">
              <button onClick={onCancel} className={`flex-1 py-4 rounded-xl border-2 font-black text-sm active:scale-95 transition-transform ${isRetro ? 'bg-white border-[#1C3052] text-[#1C3052]' : 'border-gray-500 text-white'}`}>取消</button>
              <button onClick={onConfirm} className={`flex-1 py-4 rounded-xl bg-red-600 border-2 border-red-700 text-white font-black text-sm active:scale-95 transition-transform shadow-lg`}>確認刪除</button>
            </div>
          </div>
        </div>
      );
    }

    // --- 計算指定年份的訂閱總額 ---
    const getSubInfoForYear = (i, selectedYear, exchangeRates) => {
       const toTWD = (v, c) => Math.round(parseFloat(v || 0) * (exchangeRates[c] || 1));
       if (!i.startDate) return { total: toTWD(i.fee, i.currency), count: 1 };
       const start = new Date(i.startDate);
       const now = new Date();
       let current = new Date(start);
       let total = 0;
       let count = 0;
       let cycles = 0;
       while(current <= now && cycles < 1000) {
          if (!selectedYear || current.getFullYear().toString() === selectedYear) {
              total += toTWD(i.fee, i.currency);
              count++;
          }
          if (i.paymentCycle === 'monthly') current.setMonth(current.getMonth() + 1);
          else current.setFullYear(current.getFullYear() + 1);
          cycles++;
       }
       if (cycles === 0 && (!selectedYear || start.getFullYear().toString() === selectedYear)) {
           return { total: toTWD(i.fee, i.currency), count: 1 };
       }
       return { total, count };
    }

    function GroupExpenseListModal({ theme, type, group, items, onClose, onSelectItem, exchangeRates }) {
      const [year, setYear] = useState(null); 
      const toTWD = (v, c) => Math.round(parseFloat(v || 0) * (exchangeRates[c] || 1));
      const filtered = items.filter(i => i.group === group);
      
      const years = useMemo(() => {
        const yMap = {};
        filtered.forEach(i => { 
          if (type === 'subscription' && i.startDate) {
             const start = new Date(i.startDate);
             const now = new Date();
             let current = new Date(start);
             let cycles = 0;
             while(current <= now && cycles < 1000) {
                const yr = current.getFullYear().toString();
                yMap[yr] = (yMap[yr] || 0) + toTWD(i.fee, i.currency);
                if (i.paymentCycle === 'monthly') current.setMonth(current.getMonth() + 1);
                else current.setFullYear(current.getFullYear() + 1);
                cycles++;
             }
             if (cycles === 0) {
                const yr = start.getFullYear().toString();
                yMap[yr] = (yMap[yr] || 0) + toTWD(i.fee, i.currency);
             }
          } else {
             const yr = (type === 'membership' ? i.startDate : i.date || '2025-01-01').split('-')[0];
             yMap[yr] = (yMap[yr] || 0) + toTWD(type === 'membership' ? i.fee : i.price, i.currency);
          }
        });
        return Object.entries(yMap).sort((a,b) => b[0]-a[0]);
      }, [filtered, type, exchangeRates]);

      const list = filtered.filter(i => {
         if (!year) return false;
         if (type === 'subscription' && i.startDate) {
             const start = new Date(i.startDate);
             const now = new Date();
             let current = new Date(start);
             let inYear = false;
             let cycles = 0;
             while(current <= now && cycles < 1000) {
                if (current.getFullYear().toString() === year) inYear = true;
                if (i.paymentCycle === 'monthly') current.setMonth(current.getMonth() + 1);
                else current.setFullYear(current.getFullYear() + 1);
                cycles++;
             }
             if (cycles === 0 && start.getFullYear().toString() === year) inYear = true;
             return inYear;
         }
         return (type === 'membership' ? i.startDate : i.date || '2025-01-01').startsWith(year);
      });

      return (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[120] flex items-center justify-center p-4">
          <div className={`w-full max-w-sm rounded-3xl overflow-hidden ${theme.card} flex flex-col max-h-[80vh] shadow-2xl`}>
            <div className={`p-5 border-b flex justify-between items-center ${theme.name === 'Retro Pop' ? 'bg-[#EBB134] border-[#1C3052]' : 'bg-white/5 border-white/10'}`}>
              <div className={`flex items-center gap-2 ${theme.cardText}`}>{year && <button onClick={() => setYear(null)} className="p-1"><ChevronLeft/></button>}<h2 className="text-sm font-black">{year ? `${year} 年度明細` : `${group} 明細`}</h2></div>
              <button onClick={onClose} className={`p-1 ${theme.cardText}`}><X size={20}/></button>
            </div>
            <div className="p-4 overflow-y-auto space-y-3">
              {!year ? years.map(([y, t]) => (
                <button key={y} onClick={() => setYear(y)} className={`w-full p-4 rounded-xl border flex justify-between items-center active:scale-95 transition-transform ${theme.name === 'Retro Pop' ? 'bg-white border-[#1C3052]' : 'border-white/10 bg-white/5'} ${theme.cardText}`}>
                  <span className="font-bold">{y} 年</span><span className="font-mono font-black">NT$ {t.toLocaleString()}</span>
                </button>
              )) : list.map(i => {
                const displayName = type === 'membership' 
                  ? i.fandomName 
                  : type === 'subscription'
                  ? i.platform
                  : (i.items && i.items.length > 0 ? (i.items.length === 1 ? i.items[0].name : `${i.items[0].name} 等 ${i.items.length} 件`) : i.itemName);
                
                let displayPrice = 0;
                let subInfo = '';
                if (type === 'subscription') {
                  const info = getSubInfoForYear(i, year, exchangeRates);
                  displayPrice = info.total;
                  subInfo = ` (${info.count}期)`;
                } else {
                  displayPrice = toTWD(type === 'membership' ? i.fee : i.price, i.currency);
                }

                return (
                  <button key={i.id} onClick={() => onSelectItem(i)} className={`w-full p-4 rounded-xl border text-left active:scale-95 transition-transform ${theme.name === 'Retro Pop' ? 'bg-white border-[#1C3052]' : 'border-white/10 bg-white/5'} ${theme.cardText}`}>
                    <div className="flex justify-between items-start gap-2"><span className="text-xs font-black break-words">{displayName}</span><span className="text-xs font-mono font-black whitespace-nowrap">NT$ {displayPrice.toLocaleString()}<span className="text-[9px] opacity-60 ml-0.5">{subInfo}</span></span></div>
                    <div className={`text-[9px] mt-1 opacity-50 font-mono`}>{type === 'membership' ? i.startDate : type === 'subscription' ? `開始於 ${i.startDate}` : i.date}</div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
